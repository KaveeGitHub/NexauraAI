<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NexauraAI – Thank You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #f0abfc
      );
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 540px;
      padding: 42px 32px;
      border-radius: 18px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(79, 70, 229, 0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #312e81;
    }

    p {
      font-size: 16px;
      color: #4b5563;
      margin: 14px 0;
    }

    .buttons {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    button {
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    }

    .cancel-btn {
      background: linear-gradient(135deg, #f43f5e, #fb7185);
      color: #ffffff;
    }

    .return-btn {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: #ffffff;
    }

    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Thank You for Booking a Discovery Call</h1>

    <p>
      Your discovery call with <strong>NexauraAI</strong> has been successfully scheduled.
    </p>

    <p>
      If you need to cancel your booking, you can do so below.
      Otherwise, return to continue.
    </p>

    <div class="buttons">
      <!-- Cancel Booking -->
      <button class="cancel-btn" onclick="goToCancel()">
        Cancel Booking
      </button>

      <!-- Return -->
      <button class="return-btn" onclick="goToReturn()">
        Return to Page
      </button>
    </div>

    <footer>
      © 2026 NexauraAI · Intelligent Automation
    </footer>
  </div>

  <script>
    // 🔧 REPLACE WITH YOUR LINKS
    const cancelBookingURL = "https://tally.so/r/LZ7eav";
    const returnPageURL = "https://nexauraai.netlify.app";

    function goToCancel() {
      window.location.href = cancelBookingURL;
    }

    function goToReturn() {
      window.location.href = returnPageURL;
    }
  </script>
</body>
</html>
